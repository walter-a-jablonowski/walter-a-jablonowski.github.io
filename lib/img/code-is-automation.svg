<svg viewBox="0 0 560 410" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <title>Custom code is automation too: a small program equals a workflow, optionally with its own UI</title>

  <!-- Background -->
  <rect width="560" height="410" fill="#1a1a1a"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#FF6B00"/>
    </marker>
  </defs>

  <!-- Code editor window -->
  <rect x="40" y="28" width="215" height="164" rx="8" fill="#232323" stroke="#FF6B00" stroke-width="2"/>
  <line x1="41" y1="54" x2="254" y2="54" stroke="#3a3a3a" stroke-width="1.5"/>
  <circle cx="56" cy="41" r="4" fill="#FF6B00"/>
  <circle cx="71" cy="41" r="4" fill="#FFC107"/>
  <circle cx="86" cy="41" r="4" fill="#666"/>
  <text x="106" y="45" fill="#999999" font-size="12">app.php</text>

  <!-- Code lines -->
  <rect x="56" y="68" width="60" height="7" rx="3.5" fill="#FF6B00"/>
  <rect x="122" y="68" width="90" height="7" rx="3.5" fill="#cccccc"/>
  <rect x="68" y="84" width="40" height="7" rx="3.5" fill="#FFC107"/>
  <rect x="114" y="84" width="70" height="7" rx="3.5" fill="#888888"/>
  <rect x="68" y="100" width="110" height="7" rx="3.5" fill="#888888"/>
  <rect x="68" y="116" width="55" height="7" rx="3.5" fill="#cccccc"/>
  <rect x="129" y="116" width="45" height="7" rx="3.5" fill="#FFC107"/>
  <rect x="56" y="132" width="70" height="7" rx="3.5" fill="#FF6B00"/>
  <rect x="68" y="148" width="95" height="7" rx="3.5" fill="#888888"/>
  <rect x="56" y="164" width="45" height="7" rx="3.5" fill="#cccccc"/>

  <text x="147" y="216" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="600">Program</text>
  <text x="147" y="234" text-anchor="middle" fill="#999999" font-size="12.5">fixed code</text>

  <!-- Equivalence sign -->
  <rect x="267" y="100" width="36" height="6" rx="3" fill="#FF6B00"/>
  <rect x="267" y="112" width="36" height="6" rx="3" fill="#FF6B00"/>
  <rect x="267" y="124" width="36" height="6" rx="3" fill="#FF6B00"/>

  <!-- Workflow mini-flow -->
  <rect x="330" y="32" width="190" height="38" rx="19" fill="#2d2d2d" stroke="#666" stroke-width="1.5"/>
  <text x="425" y="56" text-anchor="middle" fill="#ffffff" font-size="15">Task / Trigger</text>

  <line x1="425" y1="70" x2="425" y2="84" stroke="#FF6B00" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="330" y="88" width="190" height="42" rx="8" fill="#2d2d2d" stroke="#FF6B00" stroke-width="2"/>
  <text x="425" y="114" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="600">Process Data</text>

  <line x1="425" y1="130" x2="425" y2="144" stroke="#FF6B00" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="330" y="148" width="190" height="42" rx="8" fill="#2d2d2d" stroke="#FFC107" stroke-width="2"/>
  <text x="425" y="174" text-anchor="middle" fill="#FFC107" font-size="15" font-weight="600">Result</text>

  <text x="425" y="216" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="600">Workflow</text>
  <text x="425" y="234" text-anchor="middle" fill="#999999" font-size="12.5">the same steps</text>

  <!-- Optional UI window with bar chart -->
  <rect x="40" y="256" width="250" height="118" rx="8" fill="#232323" stroke="#555" stroke-width="1.5"/>
  <line x1="41" y1="282" x2="289" y2="282" stroke="#3a3a3a" stroke-width="1.5"/>
  <circle cx="56" cy="269" r="3.5" fill="#666"/>
  <circle cx="70" cy="269" r="3.5" fill="#666"/>
  <circle cx="84" cy="269" r="3.5" fill="#666"/>

  <rect x="60" y="324" width="26" height="40" fill="#666666"/>
  <rect x="96" y="306" width="26" height="58" fill="#FFC107"/>
  <rect x="132" y="332" width="26" height="32" fill="#666666"/>
  <rect x="168" y="298" width="26" height="66" fill="#FF6B00"/>
  <rect x="204" y="318" width="26" height="46" fill="#666666"/>
  <rect x="240" y="292" width="26" height="72" fill="#FFC107"/>

  <!-- Right column: label and benefit chips -->
  <text x="310" y="280" fill="#ffffff" font-size="15" font-weight="600">Optional: UI &amp; visualization</text>
  <text x="310" y="299" fill="#999999" font-size="12">dashboards, charts, forms</text>

  <rect x="310" y="314" width="112" height="24" rx="12" fill="#FF6B00"/>
  <text x="366" y="330" text-anchor="middle" fill="#1a1a1a" font-size="12.5" font-weight="600">AI-built &#183; fast</text>
  <rect x="432" y="314" width="88" height="24" rx="12" fill="none" stroke="#777" stroke-width="1.5"/>
  <text x="476" y="330" text-anchor="middle" fill="#aaaaaa" font-size="12.5" font-weight="600">Low cost</text>
  <rect x="310" y="348" width="160" height="24" rx="12" fill="none" stroke="#FFC107" stroke-width="1.5"/>
  <text x="390" y="364" text-anchor="middle" fill="#FFC107" font-size="12.5" font-weight="600">No platform lock-in</text>
</svg>
