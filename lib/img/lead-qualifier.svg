<svg viewBox="0 0 560 410" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <title>Lead qualifier flow: inbound lead is scored by an AI agent and answered with a drafted email</title>

  <!-- Background -->
  <rect width="560" height="410" fill="#1a1a1a"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#FF6B00"/>
    </marker>
  </defs>

  <!-- Inbound lead -->
  <rect x="50" y="26" width="240" height="44" rx="22" fill="#2d2d2d" stroke="#666" stroke-width="1.5"/>
  <text x="170" y="54" text-anchor="middle" fill="#ffffff" font-size="17">Inbound Lead</text>

  <!-- Flow arrows -->
  <line x1="170" y1="70" x2="170" y2="106" stroke="#FF6B00" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="170" y1="174" x2="170" y2="210" stroke="#FF6B00" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="170" y1="278" x2="170" y2="314" stroke="#FF6B00" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Agent 1: Sales Analyst -->
  <rect x="50" y="116" width="240" height="58" rx="8" fill="#2d2d2d" stroke="#FF6B00" stroke-width="2"/>
  <text x="170" y="141" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="600">Sales Analyst</text>
  <text x="170" y="162" text-anchor="middle" fill="#999999" font-size="12.5">AI Agent</text>

  <!-- BANT scorer tool (deterministic) -->
  <line x1="290" y1="145" x2="330" y2="145" stroke="#FFC107" stroke-width="1.5" stroke-dasharray="5 4"/>
  <rect x="330" y="118" width="200" height="54" rx="8" fill="none" stroke="#FFC107" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="430" y="140" text-anchor="middle" fill="#FFC107" font-size="15" font-weight="600">BANT Scorer</text>
  <text x="430" y="159" text-anchor="middle" fill="#999999" font-size="12">Tool &#183; Score 0&#8211;100</text>

  <!-- Tier chips -->
  <rect x="342" y="184" width="52" height="24" rx="12" fill="#FF6B00"/>
  <text x="368" y="200" text-anchor="middle" fill="#1a1a1a" font-size="12.5" font-weight="600">Super</text>
  <rect x="402" y="184" width="56" height="24" rx="12" fill="none" stroke="#FFC107" stroke-width="1.5"/>
  <text x="430" y="200" text-anchor="middle" fill="#FFC107" font-size="12.5" font-weight="600">Warm</text>
  <rect x="466" y="184" width="52" height="24" rx="12" fill="none" stroke="#777" stroke-width="1.5"/>
  <text x="492" y="200" text-anchor="middle" fill="#aaaaaa" font-size="12.5" font-weight="600">Cold</text>

  <!-- Agent 2: Outreach Writer -->
  <rect x="50" y="220" width="240" height="58" rx="8" fill="#2d2d2d" stroke="#FF6B00" stroke-width="2"/>
  <text x="170" y="245" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="600">Outreach Writer</text>
  <text x="170" y="266" text-anchor="middle" fill="#999999" font-size="12.5">AI Agent</text>

  <!-- Email draft -->
  <line x1="290" y1="249" x2="330" y2="249" stroke="#FFC107" stroke-width="1.5" stroke-dasharray="5 4"/>
  <rect x="330" y="224" width="200" height="50" rx="8" fill="#232323" stroke="#555" stroke-width="1.5"/>
  <rect x="348" y="241" width="22" height="16" rx="2" fill="none" stroke="#FF6B00" stroke-width="1.5"/>
  <path d="M348,243 l11,8 l11,-8" fill="none" stroke="#FF6B00" stroke-width="1.5"/>
  <text x="384" y="245" fill="#ffffff" font-size="14.5">Email Draft</text>
  <text x="384" y="263" fill="#999999" font-size="12">tone by tier</text>

  <!-- Result -->
  <rect x="50" y="324" width="240" height="58" rx="8" fill="#2d2d2d" stroke="#FFC107" stroke-width="2"/>
  <text x="170" y="349" text-anchor="middle" fill="#FFC107" font-size="18" font-weight="600">Qualified Lead</text>
  <text x="170" y="370" text-anchor="middle" fill="#999999" font-size="12.5">validated JSON</text>
</svg>
